<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
<title>Swing Clipper</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0c100e;
    --panel:#141b18;
    --panel-2:#1b231f;
    --line:#28332d;
    --ink:#e9efeb;
    --muted:#8a968f;
    --impact:#b8ff3c;   /* 検知・録画中 */
    --armed:#f5a623;    /* 待機 */
    --danger:#ff6b5e;
    --radius:16px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);
    font-family:Inter,-apple-system,"Hiragino Kaku Gothic ProN",sans-serif;
    overscroll-behavior:none;}
  body{display:flex;flex-direction:column;min-height:100dvh;}

  /* ---- ヘッダ ---- */
  header{display:flex;align-items:center;justify-content:space-between;
    padding:max(10px,env(safe-area-inset-top)) 16px 10px;}
  .brand{display:flex;align-items:center;gap:9px;font-weight:700;letter-spacing:.02em;}
  .brand .dot{width:9px;height:9px;border-radius:50%;background:var(--muted);
    box-shadow:0 0 0 0 rgba(184,255,60,.5);transition:background .2s;}
  .brand .dot.live{background:var(--impact);animation:pulse 1.6s infinite;}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(184,255,60,.45)}70%{box-shadow:0 0 0 10px rgba(184,255,60,0)}100%{box-shadow:0 0 0 0 rgba(184,255,60,0)}}
  .brand small{font-weight:500;color:var(--muted);font-size:11px;letter-spacing:.06em;text-transform:uppercase;}
  .brand .ver{font-size:10px;color:var(--line);font-family:"JetBrains Mono",monospace;background:var(--panel-2);
    border:1px solid var(--line);border-radius:4px;padding:1px 5px;letter-spacing:.04em;}

  /* ---- ビューファインダ ---- */
  .stage{position:relative;flex:none;height:52dvh;background:#000;
    display:flex;align-items:center;justify-content:center;overflow:hidden;}
  @media(orientation:landscape){.stage{height:90dvh;}}
  video{width:100%;height:100%;object-fit:cover;background:#000;display:block;}
  .stage.empty video{display:none;}
  .placeholder{position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:14px;text-align:center;padding:24px;color:var(--muted);}
  .placeholder svg{opacity:.5}
  .stage:not(.empty) .placeholder{display:none;}

  /* ステータスピル */
  .status{position:absolute;top:12px;left:12px;display:flex;align-items:center;gap:8px;
    background:rgba(8,12,10,.62);backdrop-filter:blur(8px);
    border:1px solid var(--line);border-radius:999px;padding:7px 13px 7px 11px;font-size:13px;font-weight:600;}
  .status .s-dot{width:8px;height:8px;border-radius:50%;background:var(--muted);}
  .status.armed .s-dot{background:var(--armed);}
  .status.rec .s-dot{background:var(--impact);animation:pulse 1s infinite;}
  .status .cd{font-family:"JetBrains Mono",monospace;color:var(--muted);font-weight:700;font-size:12px;}

  /* モーションゲージ（シグネチャ要素） */
  .gauge{position:absolute;right:12px;top:12px;bottom:96px;width:14px;
    background:rgba(8,12,10,.5);border:1px solid var(--line);border-radius:999px;
    overflow:hidden;display:flex;flex-direction:column-reverse;}
  .gauge .fill{width:100%;background:linear-gradient(180deg,var(--impact),#5fae1e);
    height:0%;transition:height .18s cubic-bezier(0.22,1,0.36,1);}
  .gauge .mark{position:absolute;left:-5px;right:-5px;height:2px;background:var(--armed);
    box-shadow:0 0 6px var(--armed);}
  .gauge.empty{display:none;}

  /* フラッシュ */
  .flash{position:absolute;inset:0;background:var(--impact);opacity:0;pointer-events:none;}
  .flash.on{animation:flash .35s ease-out;}
  @keyframes flash{0%{opacity:.32}100%{opacity:0}}

  /* ---- コントロールバー ---- */
  .controls{display:flex;flex-direction:column;gap:7px;padding:9px 16px;
    background:var(--panel);border-top:1px solid var(--line);}
  .row{display:flex;gap:10px;}
  button{font-family:inherit;font-weight:600;border:none;border-radius:var(--radius);
    color:var(--ink);background:var(--panel-2);border:1px solid var(--line);
    padding:9px 12px;font-size:14px;display:flex;align-items:center;justify-content:center;gap:7px;
    cursor:pointer;flex:1;transition:transform .08s,background .15s,border-color .15s;}
  button:active{transform:scale(.97);}
  button:disabled{opacity:.4;}
  .btn-primary{background:var(--impact);color:#0c1407;border-color:var(--impact);font-weight:700;flex:2;}
  .btn-stop{background:transparent;color:var(--danger);border-color:rgba(255,107,94,.45);flex:2;}
  .btn-cap{background:transparent;border-color:var(--line);}
  .icon{width:18px;height:18px;flex:none;}

  /* トグル群 */
  .opts{display:flex;align-items:center;gap:10px;flex-wrap:wrap;
    padding-top:0;font-size:12px;color:var(--muted);}
  .toggle{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;}
  .switch{width:40px;height:23px;border-radius:999px;background:var(--panel-2);
    border:1px solid var(--line);position:relative;transition:background .15s;flex:none;}
  .switch::after{content:"";position:absolute;top:2px;left:2px;width:17px;height:17px;border-radius:50%;
    background:var(--muted);transition:transform .15s,background .15s;}
  .toggle.on .switch{background:rgba(184,255,60,.25);border-color:var(--impact);}
  .toggle.on .switch::after{transform:translateX(17px);background:var(--impact);}
  .toggle.on span{color:var(--ink);}

  .slider-wrap{display:flex;align-items:center;gap:10px;flex:1;min-width:160px;}
  .slider-wrap label{font-size:13px;color:var(--muted);white-space:nowrap;}
  input[type=range]{-webkit-appearance:none;appearance:none;height:4px;border-radius:999px;
    background:var(--line);flex:1;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;
    background:var(--impact);border:3px solid var(--bg);cursor:pointer;}
  .val{font-family:"JetBrains Mono",monospace;font-size:13px;color:var(--ink);width:26px;text-align:right;}

  /* ---- クリップ一覧 ---- */
  .clips{padding:8px 16px max(18px,env(safe-area-inset-bottom));background:var(--bg);}
  .clips-head{display:flex;align-items:center;justify-content:space-between;
    padding:10px 2px 12px;}
  .clips-head h2{margin:0;font-size:14px;font-weight:700;letter-spacing:.02em;}
  .clips-head .count{font-family:"JetBrains Mono",monospace;color:var(--muted);font-size:12px;}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
  .clip{background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden;}
  .clip .thumb{position:relative;aspect-ratio:3/4;background:#000;}
  .clip video{width:100%;height:100%;object-fit:cover;}
  .clip .play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
  .clip .play svg{width:46px;height:46px;filter:drop-shadow(0 2px 6px rgba(0,0,0,.6));opacity:.92}
  .clip .meta{display:flex;align-items:center;justify-content:space-between;
    padding:8px 10px;font-size:12px;}
  .clip .meta .t{font-family:"JetBrains Mono",monospace;color:var(--muted);}
  .clip .acts{display:flex;gap:6px;padding:0 8px 8px;}
  .clip .acts button{flex:1;padding:9px;font-size:13px;border-radius:10px;}
  .clip .acts .save{background:var(--impact);color:#0c1407;border-color:var(--impact);font-weight:700;}
  .clip .acts .del{background:transparent;color:var(--muted);border-color:var(--line);flex:0 0 44px;}
  .empty-clips{color:var(--muted);font-size:13px;text-align:center;padding:26px 0 30px;line-height:1.6;}

  .note{font-size:12px;color:var(--muted);line-height:1.55;padding:4px 2px 2px;}
  .warn{background:rgba(255,107,94,.1);border:1px solid rgba(255,107,94,.4);color:#ffd7d2;
    border-radius:12px;padding:11px 13px;font-size:13px;line-height:1.5;margin:0 16px 12px;}
  .hidden{display:none!important;}
</style>
</head>
<body>
<header>
  <div class="brand">
    <span class="dot" id="liveDot"></span>
    Swing Clipper
    <small>auto-clip</small>
    <span class="ver">v1.4</span>
  </div>
</header>

<div id="compatWarn" class="warn hidden"></div>

<div class="stage empty" id="stage">
  <video id="video" playsinline muted autoplay></video>
  <div class="placeholder">
    <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
      <path d="M14 6l7-3v15l-7-3"/><circle cx="8.5" cy="13.5" r="6.5"/>
    </svg>
    <div>三脚にセットして<br><b style="color:var(--ink)">カメラを開始</b>を押してください</div>
  </div>
  <div class="status" id="status"><span class="s-dot"></span><span id="statusText">停止中</span><span class="cd" id="cd"></span></div>
  <div class="gauge empty" id="gauge"><div class="fill" id="gaugeFill"></div><div class="mark" id="gaugeMark"></div></div>
  <div class="flash" id="flash"></div>
</div>

<div class="controls">
  <div class="row">
    <button class="btn-primary" id="startBtn">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
      カメラを開始
    </button>
    <button class="btn-stop hidden" id="stopBtn">停止</button>
    <button class="btn-cap" id="flipBtn" disabled>
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.5 9a9 9 0 0114.9-3.4L23 10M1 14l4.6 4.4A9 9 0 0020.5 15"/></svg>
      切替
    </button>
  </div>
  <div class="opts">
    <div class="toggle on" id="autoToggle"><span class="switch"></span><span>自動検知</span></div>
    <div class="slider-wrap">
      <label>感度</label>
      <input type="range" id="sens" min="1" max="10" value="6">
      <span class="val" id="sensVal">6</span>
    </div>
    <div class="slider-wrap">
      <label>巻き戻し</label>
      <input type="range" id="preroll" min="15" max="38" value="26">
      <span class="val" id="prerollVal">2.6s</span>
    </div>
  </div>
</div>

<div class="clips">
  <div class="clips-head">
    <h2>スイング</h2><span class="count" id="clipCount">0</span>
  </div>
  <div class="grid hidden" id="grid"></div>
  <div class="empty-clips" id="emptyClips">スイングを検知すると、ここに1本ずつたまります。<br>各クリップの「保存」で写真アプリに残せます。</div>
</div>

<script>
"use strict";
const $ = (id)=>document.getElementById(id);

// ---- 定数 ----
const TARGET_MAX_DIM = 540;   // 録画解像度の長辺上限
const BUF_FPS = 18;           // 先読みバッファのフレームレート
const POST_MS = 1500;         // 検知後に録る長さ
const POST_FPS = 25;
const COOLDOWN_MS = 1500;     // 連続検知の抑制
const MAX_CLIPS = 12;

const els = {
  stage:$("stage"), video:$("video"), status:$("status"), statusText:$("statusText"), cd:$("cd"),
  gauge:$("gauge"), gaugeFill:$("gaugeFill"), gaugeMark:$("gaugeMark"), flash:$("flash"),
  startBtn:$("startBtn"), flipBtn:$("flipBtn"), stopBtn:$("stopBtn"),
  autoToggle:$("autoToggle"), sens:$("sens"), sensVal:$("sensVal"),
  preroll:$("preroll"), prerollVal:$("prerollVal"),
  grid:$("grid"), emptyClips:$("emptyClips"), clipCount:$("clipCount"),
  liveDot:$("liveDot"), compatWarn:$("compatWarn"),
};

// ---- 状態 ----
let stream=null, running=false, facing="environment";
let mode="idle"; // idle | capturing
let autoDetect=true;
let cooldownUntil=0;
let rafId=null;

// 解析用
const aCanvas=document.createElement("canvas"); aCanvas.width=80; aCanvas.height=60;
const aCtx=aCanvas.getContext("2d",{willReadFrequently:true});
let prevData=null, motion=0, motionSmooth=0;

// 録画キャンバス
const rCanvas=document.createElement("canvas");
const rCtx=rCanvas.getContext("2d");

// 先読みバッファ（canvasのプール）
let buf=[];           // {canvas,ctx,t}
let bufLen=0, bufHead=0, lastBufT=0;
const PREROLL_MS=()=>parseInt(els.preroll.value)*100;

let mime="";

// ---- 互換チェック ----
function checkSupport(){
  const issues=[];
  if(!navigator.mediaDevices?.getUserMedia) issues.push("カメラ取得(getUserMedia)");
  if(typeof MediaRecorder==="undefined") issues.push("録画(MediaRecorder)");
  const testC=document.createElement("canvas");
  if(!testC.captureStream) issues.push("キャンバス録画(captureStream)");
  if(issues.length){
    els.compatWarn.classList.remove("hidden");
    els.compatWarn.innerHTML="このブラウザは次の機能に未対応のため、動画書き出しが動かない可能性があります：<b>"+issues.join("・")+"</b>。iOSは最新のSafari/Chromeでお試しください。";
  }
}
function pickMime(){
  const cand=["video/mp4","video/mp4;codecs=avc1","video/webm;codecs=vp9","video/webm;codecs=vp8","video/webm"];
  for(const m of cand){ if(MediaRecorder.isTypeSupported?.(m)) return m; }
  return "";
}

// ---- カメラ起動 ----
async function startCamera(){
  try{
    if(stream) stream.getTracks().forEach(t=>t.stop());
    stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:{ideal:facing}, width:{ideal:1280}, height:{ideal:720}},
      audio:false
    });
    els.video.srcObject=stream;
    await els.video.play();
    await new Promise(r=>{ if(els.video.videoWidth) r(); else els.video.onloadedmetadata=()=>r(); });

    setupCanvases();
    running=true; mode="idle"; cooldownUntil=0;
    els.stage.classList.remove("empty");
    els.gauge.classList.remove("empty");
    els.liveDot.classList.add("live");
    els.startBtn.classList.add("hidden");
    els.stopBtn.classList.remove("hidden");
    els.flipBtn.disabled=false;
    setStatus();
    loop();
  }catch(e){
    let hint="";
    if(window.self!==window.top){
      hint="プレビュー枠（埋め込み）の中ではカメラを使えません。このHTMLをスマホのブラウザで直接開いてください（HTTPS推奨：GitHub Pagesなど）。";
    }else if(!window.isSecureContext){
      hint="HTTPSでないとカメラを使えません。https:// で配信して開いてください。";
    }else if(e.name==="NotAllowedError"){
      hint="カメラが拒否されています。ブラウザ設定でこのサイトのカメラを許可してください。";
    }else if(e.name==="NotFoundError"){
      hint="カメラが見つかりませんでした。";
    }else{
      hint="設定でカメラ許可を確認してください。";
    }
    showError("カメラを開始できません（"+(e.name||"Error")+"）。"+hint);
  }
}

function showError(msg){
  els.compatWarn.classList.remove("hidden");
  els.compatWarn.textContent=msg;
}

function setupCanvases(){
  const vw=els.video.videoWidth, vh=els.video.videoHeight;
  const scale=Math.min(1, TARGET_MAX_DIM/Math.max(vw,vh));
  rCanvas.width=Math.round(vw*scale); rCanvas.height=Math.round(vh*scale);
  // バッファプール確保
  const maxFrames=Math.ceil(PREROLL_MS()/1000*BUF_FPS)+4;
  buf=[]; for(let i=0;i<maxFrames;i++){
    const c=document.createElement("canvas"); c.width=rCanvas.width; c.height=rCanvas.height;
    buf.push({canvas:c,ctx:c.getContext("2d"),t:0});
  }
  bufLen=0; bufHead=0; lastBufT=0; prevData=null;
}

function stopCamera(){
  running=false; mode="idle";
  if(rafId) cancelAnimationFrame(rafId);
  if(stream) stream.getTracks().forEach(t=>t.stop());
  stream=null; els.video.srcObject=null;
  els.stage.classList.add("empty"); els.gauge.classList.add("empty");
  els.liveDot.classList.remove("live");
  els.startBtn.classList.remove("hidden");
  els.stopBtn.classList.add("hidden");
  els.flipBtn.disabled=true;
  els.startBtn.innerHTML='<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg> カメラを開始';
  setStatus();
}

// ---- メインループ：解析＋バッファ ----
function loop(){
  if(!running){return;}
  rafId=requestAnimationFrame(loop);
  if(mode!=="idle") return; // 録画中はバッファ更新と検知を止める

  const now=performance.now();

  // 解析（毎フレーム）
  aCtx.drawImage(els.video,0,0,aCanvas.width,aCanvas.height);
  const cur=aCtx.getImageData(0,0,aCanvas.width,aCanvas.height).data;
  if(prevData){
    let diff=0; const n=cur.length;
    for(let i=0;i<n;i+=4){ diff+=Math.abs(cur[i]-prevData[i]); } // R成分だけ
    const mean=diff/(n/4); // 0..255
    motion=Math.min(100, mean*2.4);
  }
  prevData=cur;
  motionSmooth=motionSmooth*0.75+motion*0.25;
  els.gaugeFill.style.height=motionSmooth+"%";

  // しきい値（感度→低いほど検知しやすい）
  const sens=parseInt(els.sens.value);
  const thr=70-sens*5.5;  // 1→64.5, 10→15
  els.gaugeMark.style.bottom=thr+"%";

  // 先読みバッファ更新
  if(now-lastBufT>=1000/BUF_FPS){
    const slot=buf[bufHead];
    slot.ctx.drawImage(els.video,0,0,rCanvas.width,rCanvas.height);
    slot.t=now;
    bufHead=(bufHead+1)%buf.length;
    bufLen=Math.min(bufLen+1,buf.length);
    lastBufT=now;
  }

  // 自動検知
  if(autoDetect && now>cooldownUntil && motionSmooth>thr){
    captureClip();
  }
}

// ---- バッファから直近フレームを時系列で取り出す ----
function collectPreroll(){
  const now=performance.now();
  const horizon=now-PREROLL_MS();
  const out=[];
  for(let k=0;k<bufLen;k++){
    const idx=(bufHead-1-k+buf.length*2)%buf.length;
    const f=buf[idx];
    if(f.t>=horizon) out.push(f); else break;
  }
  out.reverse(); // 古い→新しい
  return out;
}

const wait=(ms)=>new Promise(r=>setTimeout(r,ms));

// ---- クリップ生成（先読み再生＋ライブ後録り） ----
async function captureClip(){
  if(mode!=="idle"||!running) return;
  mode="capturing";
  setStatus();
  els.flash.classList.remove("on"); void els.flash.offsetWidth; els.flash.classList.add("on");

  const preroll=collectPreroll();
  if(!mime) mime=pickMime();

  let recorder, chunks=[];
  try{
    const recStream=rCanvas.captureStream(POST_FPS);
    recorder=new MediaRecorder(recStream, mime?{mimeType:mime}:undefined);
  }catch(e){
    alert("録画を開始できませんでした：\n"+e.message); mode="idle"; setStatus(); return;
  }
  recorder.ondataavailable=(ev)=>{ if(ev.data&&ev.data.size>0) chunks.push(ev.data); };
  const done=new Promise(res=>{ recorder.onstop=()=>res(); });
  recorder.start();

  // フェーズA：アドレス〜バックスイング（バッファ再生）
  const frameInterval=1000/BUF_FPS;
  for(const f of preroll){
    rCtx.drawImage(f.canvas,0,0);
    await wait(frameInterval);
  }
  // フェーズB：インパクト〜フォロー（ライブ）
  const postEnd=performance.now()+POST_MS;
  const postInterval=1000/POST_FPS;
  while(performance.now()<postEnd && running){
    rCtx.drawImage(els.video,0,0,rCanvas.width,rCanvas.height);
    await wait(postInterval);
  }

  recorder.stop();
  await done;

  const type=mime||(chunks[0]&&chunks[0].type)||"video/webm";
  const blob=new Blob(chunks,{type});
  addClip(blob, type);

  // クールダウン
  cooldownUntil=performance.now()+COOLDOWN_MS;
  motionSmooth=0; prevData=null;
  mode="idle";
  setStatus();
}

// ---- クリップ一覧 ----
let clipSeq=0;
function addClip(blob,type){
  clipSeq++;
  const url=URL.createObjectURL(blob);
  const ext=type.includes("mp4")?"mp4":"webm";
  const now=new Date();
  const pad=(x)=>String(x).padStart(2,"0");
  const stamp=`${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}_${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}`;
  const fname=`swing_${stamp}.${ext}`;
  const timeLabel=`${pad(now.getHours())}:${pad(now.getMinutes())}`;
  const sizeKB=Math.round(blob.size/1024);

  const card=document.createElement("div");
  card.className="clip";
  card.innerHTML=`
    <div class="thumb">
      <video src="${url}" preload="metadata" playsinline muted></video>
      <div class="play"><svg viewBox="0 0 24 24" fill="#fff"><circle cx="12" cy="12" r="11" fill="rgba(0,0,0,.4)"/><path d="M10 8l6 4-6 4z" fill="#fff"/></svg></div>
    </div>
    <div class="meta"><span>#${clipSeq}</span><span class="t">${timeLabel} · ${sizeKB}KB</span></div>
    <div class="acts">
      <button class="save">保存</button>
      <button class="del">✕</button>
    </div>`;

  const v=card.querySelector("video");
  const playIcon=card.querySelector(".play");
  const thumb=card.querySelector(".thumb");
  v.addEventListener('loadedmetadata',()=>{ v.currentTime=0.1; },{once:true});
  let playing=false;
  thumb.onclick=()=>{
    if(playing){ v.pause(); v.currentTime=0; playIcon.style.display="flex"; playing=false; }
    else{ v.play(); playIcon.style.display="none"; playing=true; }
  };
  v.onended=()=>{ playIcon.style.display="flex"; playing=false; };

  card.querySelector(".save").onclick=()=>saveClip(blob,fname,type);
  card.querySelector(".del").onclick=()=>{
    URL.revokeObjectURL(url); card.remove(); refreshClipUI();
  };

  els.grid.prepend(card);
  // 上限超過は古いものから削除
  while(els.grid.children.length>MAX_CLIPS){ els.grid.lastElementChild.remove(); }
  refreshClipUI();
}

function refreshClipUI(){
  const n=els.grid.children.length;
  els.clipCount.textContent=n;
  els.grid.classList.toggle("hidden",n===0);
  els.emptyClips.classList.toggle("hidden",n!==0);
}

// ---- 保存：共有シート（写真に保存）→ ダウンロードへフォールバック ----
async function saveClip(blob,fname,type){
  const file=new File([blob],fname,{type});
  if(navigator.canShare && navigator.canShare({files:[file]})){
    try{ await navigator.share({files:[file], title:fname}); return; }
    catch(e){ if(e.name==="AbortError") return; }
  }
  // フォールバック：ダウンロード
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a"); a.href=url; a.download=fname;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),4000);
}

// ---- ステータス表示 ----
function setStatus(){
  els.status.classList.remove("armed","rec");
  if(!running){ els.statusText.textContent="停止中"; els.cd.textContent=""; return; }
  if(mode==="capturing"){ els.status.classList.add("rec"); els.statusText.textContent="切り出し中"; els.cd.textContent=""; return; }
  if(autoDetect){ els.status.classList.add("armed"); els.statusText.textContent="検知待機"; }
  else{ els.statusText.textContent="手動モード"; }
  els.cd.textContent="";
}

// クールダウン表示
setInterval(()=>{
  if(running && mode==="idle"){
    const left=cooldownUntil-performance.now();
    els.cd.textContent = left>0 ? (left/1000).toFixed(1)+"s" : "";
  }
},120);

// ---- イベント ----
els.startBtn.onclick=startCamera;
els.stopBtn.onclick=stopCamera;
els.flipBtn.onclick=async()=>{ facing=(facing==="environment")?"user":"environment"; if(running) await startCamera(); };
els.autoToggle.onclick=()=>{ autoDetect=!autoDetect; els.autoToggle.classList.toggle("on",autoDetect); setStatus(); };
els.sens.oninput=()=>{ els.sensVal.textContent=els.sens.value; };
els.preroll.oninput=()=>{ els.prerollVal.textContent=(parseInt(els.preroll.value)/10).toFixed(1)+"s"; if(running) setupCanvases(); };

checkSupport();
if(window.self!==window.top){
  els.compatWarn.classList.remove("hidden");
  els.compatWarn.innerHTML="このプレビュー枠ではカメラを使えません。HTMLを<b>スマホのブラウザで直接</b>開いてください（HTTPS配信が必要：GitHub Pagesなど）。";
}
</script>
